<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="start-screen" class="active screen">
            <h1>Flappy Bird</h1>
            <p>Press Space to Fly</p>
            <button id="start-button" class="btn">Start Game</button>
        </div>
        <div id="game-area">
            <div id="bird"></div>
            <div id="score">0</div>
        </div>
        <div id="game-over-screen" class="screen">
            <h1>Game Over</h1>
            <p>Your Score: <span id="final-score"></span> pts.</p>
            <button id="restart-button" class="btn">Restart Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
